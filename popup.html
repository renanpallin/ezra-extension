<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Ezra Task Bundler</title>
  <style>
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 14px; margin: 0; color: #1f2937; }
    h1 { font-size: 14px; margin: 0 0 10px; font-weight: 600; }
    .target-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #4b5563; margin-bottom: 12px; }
    .target-name { flex: 1; word-break: break-all; padding: 4px 8px; background: #f3f4f6; border-radius: 3px; }
    button { width: 100%; padding: 8px 10px; font-size: 13px; cursor: pointer; border: 1px solid #d1d5db; background: #fff; border-radius: 4px; margin-bottom: 6px; }
    button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; margin-top: 10px; padding: 8px 10px; border-radius: 4px; white-space: pre-wrap; line-height: 1.4; }
    .status.ok { background: #dcfce7; color: #166534; }
    .status.err { background: #fee2e2; color: #991b1b; }
    .status.info { background: #f3f4f6; color: #374151; }
    .tasks { margin: 12px 0; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .tasks-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; margin-bottom: 6px; }
    .task-row { display: flex; gap: 6px; align-items: center; }
    select { flex: 1; min-width: 0; padding: 7px 8px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; }
    .icon-btn { width: auto; flex: 0 0 auto; padding: 7px 9px; margin: 0; line-height: 1; }
  </style>
</head>
<body>
  <h1>Ezra Task Bundler</h1>
  <div class="target-row">
    <span>Pasta:</span>
    <span class="target-name" id="target">—</span>
  </div>
  <button class="primary" id="bundle" disabled>Empacotar ticket</button>
  <button id="review" disabled>Exportar code review</button>
  <button id="setFolder">Selecionar pasta destino…</button>
  <div class="tasks" id="wiPicker" style="display:none">
    <div class="tasks-label">Work item do review</div>
    <div class="task-row">
      <select id="wiSelect" title="Escolher work item"></select>
      <button class="icon-btn" id="wiConfirm" title="Confirmar">✓</button>
    </div>
  </div>
  <div class="tasks" id="tasks" style="display:none">
    <div class="tasks-label">Task ativa</div>
    <div class="task-row">
      <select id="taskSelect" title="Trocar de task"></select>
      <button class="icon-btn" id="removeTask" title="Remover task do _task/">🗑</button>
    </div>
  </div>
  <div class="status" id="status" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
